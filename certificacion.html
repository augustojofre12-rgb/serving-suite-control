<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serving Suite Control — Certificación</title>
<link rel="stylesheet" href="styles.css">
<style>
  .tabs { display:flex; gap:0; margin-bottom:24px; border-bottom:2px solid #dde3dd; }
  .tab-btn {
    padding:12px 28px; font-size:14px; font-weight:600; cursor:pointer;
    background:none; border:none; color:var(--gray); border-bottom:3px solid transparent;
    margin-bottom:-2px; transition:all .2s;
  }
  .tab-btn:hover { color:var(--primary); }
  .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="ph">
      <div class="ph-left">
        <h1>Certificación</h1>
        <p>Gestión de certificaciones de subcontratistas y equipos</p>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="cambiarTab('subcontratistas')">🏗️ Subcontratistas</button>
      <button class="tab-btn" onclick="cambiarTab('equipos')">🚜 Equipos</button>
    </div>

    <!-- TAB: SUBCONTRATISTAS -->
    <div class="tab-content active" id="tab-subcontratistas">
      <div class="empty">
        <div class="empty-icon">🏗️</div>
        <h3>Certificación de Subcontratistas</h3>
        <p>En desarrollo — próximamente disponible</p>
      </div>
    </div>

    <!-- TAB: EQUIPOS -->
    <div class="tab-content" id="tab-equipos">
      <div class="empty">
        <div class="empty-icon">🚜</div>
        <h3>Certificación de Equipos</h3>
        <p>En desarrollo — próximamente disponible</p>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
let usuario = null

async function init() {
  usuario = await requireAuth()
  if (!usuario) return
  renderSidebar(usuario, 'certificacion')
}

function cambiarTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')
  event.currentTarget.classList.add('active')
}

init()
</script>
</body>
</html>
