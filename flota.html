<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serving Suite Control — Flota de Equipos</title>
<link rel="stylesheet" href="styles.css">
<style>
  /* Menú tres puntos */
  .menu-wrap { position: relative; display: inline-block; }
  .menu-btn {
    background: none; border: none; cursor: pointer;
    font-size: 18px; color: var(--gray); padding: 4px 10px;
    border-radius: 6px; line-height: 1; transition: background .15s;
  }
  .menu-btn:hover { background: #f0f0f0; color: var(--text); }
  .menu-dropdown {
    display: none;
    position: fixed;
    background: #fff;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,.12);
    z-index: 100;
    min-width: 150px;
    overflow: hidden;
  }
  .menu-dropdown.open { display: block; }
  .menu-dropdown button {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 10px 16px;
    background: none; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--text);
    text-align: left; transition: background .15s;
  }
  .menu-dropdown button:hover { background: #f5f7f5; }
  .menu-dropdown button.danger { color: var(--danger); }
  .menu-dropdown button.danger:hover { background: #fff0f0; }
  .menu-sep { height: 1px; background: #f0f0f0; margin: 2px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" style="display:flex;flex-direction:column;height:100vh;overflow:hidden;padding-bottom:0">

    <!-- HEADER FIJO -->
    <div style="flex-shrink:0;background:#c8dfd2;margin:-28px -32px 0;padding:28px 32px 18px;border-bottom:2px solid #a8c9b8;box-shadow:0 4px 16px rgba(30,107,64,.12)">
      <div class="ph" style="margin-bottom:16px">
        <div class="ph-left">
          <h1>Flota de Equipos</h1>
          <p>Administrá los equipos y maquinarias disponibles</p>
        </div>
        <button class="btn btn-accent" id="btn-agregar" onclick="abrirModal()" style="display:none">+ Agregar Equipo</button>
      </div>
      <div class="cards3" style="margin-bottom:16px">
        <div class="card bl-primary">
          <div class="card-label">Total Equipos</div>
          <div class="card-value" id="cnt-total">—</div>
          <div class="card-sub">En el sistema</div>
        </div>
        <div class="card bl-ok">
          <div class="card-label">Equipos Propios</div>
          <div class="card-value" id="cnt-propios">—</div>
          <div class="card-sub">De la empresa</div>
        </div>
        <div class="card bl-warn">
          <div class="card-label">Equipos Alquilados</div>
          <div class="card-value" id="cnt-alquilados">—</div>
          <div class="card-sub">Externos / subcontratados</div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
        <h3 style="font-size:15px;font-weight:700;color:var(--text)">Listado de Equipos</h3>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="text" id="buscador" placeholder="Buscar equipo..." oninput="filtrarTabla()"
            style="padding:8px 14px;border:1.5px solid #dde3dd;border-radius:8px;font-size:13px;outline:none;width:220px;background:#fff">
          <select id="filtro-tipo" onchange="filtrarTabla()"
            style="padding:8px 12px;border:1.5px solid #dde3dd;border-radius:8px;font-size:13px;outline:none;background:#fff">
            <option value="">Todos los tipos</option>
            <option value="Propio">Propios</option>
            <option value="Alquilado">Alquilados</option>
          </select>
        </div>
      </div>
    </div>

    <!-- TABLA CON SCROLL PROPIO -->
    <div style="flex:1;overflow-y:auto;padding:20px 0 28px">
      <div class="tbl-wrap">
        <table id="tabla-flota">
          <thead><tr>
            <th style="width:70px" class="tc">Orden</th>
            <th style="width:100px">N° Interno</th>
            <th>Nombre del Equipo</th>
            <th style="width:120px">Tipo</th>
            <th style="width:90px">Estado</th>
            <th style="width:120px"></th>
          </tr></thead>
          <tbody id="tbody-flota">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray)">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal-equipo">
  <div class="modal" style="width:480px;max-width:95vw">
    <h2 id="modal-titulo">Agregar Equipo</h2>
    <input type="hidden" id="eq-id">
    <div class="row2">
      <div class="fg">
        <label>N° Interno</label>
        <input type="text" id="eq-numero" placeholder="Ej: M-01, CAM-03">
      </div>
      <div class="fg">
        <label>Tipo</label>
        <select id="eq-tipo">
          <option value="Propio">Propio</option>
          <option value="Alquilado">Alquilado</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="fg">
        <label>N° de Orden <span style="font-weight:400;color:var(--gray)">(para agrupar)</span></label>
        <input type="number" id="eq-orden" placeholder="Ej: 1, 2, 3..." min="0">
      </div>
      <div class="fg"></div>
    </div>
    <div class="fg">
      <label>Nombre del Equipo *</label>
      <input type="text" id="eq-nombre" placeholder="Ej: Fresadora Wirtgen W200">
    </div>
    <div class="fg" style="max-width:160px">
      <label>Estado</label>
      <select id="eq-activo">
        <option value="true">Activo</option>
        <option value="false">Inactivo</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-success" id="btn-guardar-eq" onclick="guardarEquipo()">✓ Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
let usuario = null
let equipos = []

async function init() {
  usuario = await requireAuth()
  if (!usuario) return
  if (usuario.rol === 'jefe_obra') { window.location.href = 'dashboard.html'; return }
  renderSidebar(usuario, 'flota')
  if (usuario.rol === 'coordinador') document.getElementById('btn-agregar').style.display = 'inline-flex'
  await cargarEquipos()
}

async function cargarEquipos() {
  const { data, error } = await db.from('flota_equipos').select('*').order('orden').order('nombre')
  if (error) { toast('Error al cargar equipos', 'error'); return }
  equipos = data || []
  renderCards()
  renderTabla(equipos)
}

function renderCards() {
  const total     = equipos.length
  const propios   = equipos.filter(e => e.tipo === 'Propio').length
  const alquilados = equipos.filter(e => e.tipo === 'Alquilado').length
  document.getElementById('cnt-total').textContent     = total
  document.getElementById('cnt-propios').textContent   = propios
  document.getElementById('cnt-alquilados').textContent = alquilados
}

function renderTabla(lista) {
  const tbody = document.getElementById('tbody-flota')
  if (lista.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--gray)">
      No hay equipos registrados aún</td></tr>`
    return
  }
  const esCoord = usuario.rol === 'coordinador'
  tbody.innerHTML = lista.map(e => `
    <tr style="opacity:${e.activo ? 1 : 0.5}">
      <td class="tc" style="font-size:13px;color:var(--gray);font-weight:600">${e.orden ?? '—'}</td>
      <td><strong>${e.numero_interno || '—'}</strong></td>
      <td>${e.nombre}</td>
      <td><span class="badge ${e.tipo === 'Propio' ? 'b-ok' : 'b-warn'}">${e.tipo}</span></td>
      <td><span class="badge ${e.activo ? 'b-ok' : 'b-blue'}">${e.activo ? 'Activo' : 'Inactivo'}</span></td>
      <td class="tc">
        ${esCoord ? `
        <div class="menu-wrap">
          <button class="menu-btn" onclick="toggleMenu(event,'menu-${e.id}')">⋮</button>
          <div class="menu-dropdown" id="menu-${e.id}">
            <button onclick="editarEquipo('${e.id}');cerrarMenus()">✏️ &nbsp;Editar</button>
            <div class="menu-sep"></div>
            <button class="danger" onclick="eliminarEquipo('${e.id}');cerrarMenus()">🗑️ &nbsp;Eliminar</button>
          </div>
        </div>` : ''}
      </td>
    </tr>`).join('')
}

function filtrarTabla() {
  const texto = document.getElementById('buscador').value.toLowerCase()
  const tipo  = document.getElementById('filtro-tipo').value
  const filtrados = equipos.filter(e => {
    const matchTexto = e.nombre.toLowerCase().includes(texto) || (e.numero_interno||'').toLowerCase().includes(texto)
    const matchTipo  = !tipo || e.tipo === tipo
    return matchTexto && matchTipo
  })
  renderTabla(filtrados)
}

function abrirModal(equipo = null) {
  document.getElementById('eq-id').value      = equipo?.id || ''
  document.getElementById('eq-numero').value  = equipo?.numero_interno || ''
  document.getElementById('eq-nombre').value  = equipo?.nombre || ''
  document.getElementById('eq-tipo').value    = equipo?.tipo || 'Propio'
  document.getElementById('eq-orden').value   = equipo?.orden ?? ''
  document.getElementById('eq-activo').value  = equipo ? String(equipo.activo) : 'true'
  document.getElementById('modal-titulo').textContent = equipo ? 'Editar Equipo' : 'Agregar Equipo'
  document.getElementById('modal-equipo').classList.add('open')
  document.getElementById('eq-nombre').focus()
}

function cerrarModal() {
  document.getElementById('modal-equipo').classList.remove('open')
}

function editarEquipo(id) {
  const eq = equipos.find(e => e.id === id)
  if (eq) abrirModal(eq)
}

async function guardarEquipo() {
  const nombre = document.getElementById('eq-nombre').value.trim()
  if (!nombre) { toast('El nombre del equipo es obligatorio', 'error'); return }

  const btn = document.getElementById('btn-guardar-eq')
  btn.textContent = 'Guardando...'
  btn.disabled = true

  const id     = document.getElementById('eq-id').value
  const ordenVal = document.getElementById('eq-orden').value
  const datos  = {
    numero_interno: document.getElementById('eq-numero').value.trim() || null,
    nombre,
    tipo:   document.getElementById('eq-tipo').value,
    orden:  ordenVal !== '' ? parseInt(ordenVal) : null,
    activo: document.getElementById('eq-activo').value === 'true'
  }

  const { error } = id
    ? await db.from('flota_equipos').update(datos).eq('id', id)
    : await db.from('flota_equipos').insert(datos)

  if (error) { toast('Error al guardar', 'error'); btn.textContent = '✓ Guardar'; btn.disabled = false; return }

  toast(id ? 'Equipo actualizado' : 'Equipo agregado correctamente')
  cerrarModal()
  btn.textContent = '✓ Guardar'
  btn.disabled = false
  await cargarEquipos()
}

async function eliminarEquipo(id) {
  if (!confirm('¿Eliminás este equipo del sistema?')) return
  const { error } = await db.from('flota_equipos').delete().eq('id', id)
  if (error) { toast('Error al eliminar', 'error'); return }
  toast('Equipo eliminado')
  await cargarEquipos()
}

function toggleMenu(e, id) {
  e.stopPropagation()
  cerrarMenus()
  const menu = document.getElementById(id)
  if (!menu) return
  const btn  = e.currentTarget
  const rect = btn.getBoundingClientRect()
  menu.style.top  = (rect.bottom + 4) + 'px'
  menu.style.left = (rect.right - 155) + 'px'
  menu.classList.toggle('open')
}
function cerrarMenus() {
  document.querySelectorAll('.menu-dropdown.open').forEach(m => m.classList.remove('open'))
}
document.addEventListener('click', cerrarMenus)

init()
</script>
</body>
</html>
