<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serving Suite Control — Resumen Semanal</title>
<link rel="stylesheet" href="styles.css">
<style>
@media print {
  @page { size: A4 portrait; margin: 10mm 12mm; }
  .sidebar, .no-print { display: none !important; }
  html, body { background: white !important; margin: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; width: 100% !important; }
  .app { display: block !important; height: auto !important; overflow: visible !important; width: 100% !important; padding: 0 !important; margin: 0 !important; background: white !important; }
  .main { display: block !important; padding: 0 !important; margin: 0 !important; overflow: visible !important; height: auto !important; background: white !important; width: 100% !important; max-width: none !important; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .rs-obra-card { break-inside: avoid; }
}

.rs-controls {
  background: #c8dfd2; border-radius: 14px; padding: 18px 22px;
  margin-bottom: 20px; border: 1.5px solid #a8c9b8;
}
.rs-check-list {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px; margin: 14px 0;
}
.rs-check-item {
  display: flex; align-items: center; gap: 8px;
  background: white; border-radius: 8px; padding: 9px 12px;
  border: 1.5px solid #dde3dd; cursor: pointer; font-size: 13px; font-weight: 600;
}
.rs-check-item input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }

.rs-header {
  background: linear-gradient(135deg, #1e6b40 0%, #2d8f58 100%);
  color: white; border-radius: 14px 14px 0 0;
  padding: 22px 28px; display: flex; justify-content: space-between; align-items: center;
}
.rs-header h2 { font-size: 19px; font-weight: 800; margin: 0 0 3px; }
.rs-header p { font-size: 12px; opacity: .85; margin: 0; }
.rs-wrap { background: white; border-radius: 14px; border: 1.5px solid #e0e8e0; box-shadow: 0 2px 16px rgba(0,0,0,.07); overflow: hidden; max-width: 980px; }

.rs-obra-card {
  padding: 16px 28px; border-bottom: 1px solid #f0f0f0;
  display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 14px; align-items: center;
}
.rs-obra-card:last-child { border-bottom: none; }
.rs-obra-nombre { font-weight: 800; font-size: 14px; color: var(--text); }
.rs-obra-ubic { font-size: 11px; color: var(--gray); margin-top: 2px; }
.rs-metric-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .04em; color: var(--gray); font-weight: 700; margin-bottom: 3px; }
.rs-metric-val { font-size: 14px; font-weight: 800; }
.rs-bar-outer { background: #ece8e0; border-radius: 6px; height: 8px; overflow: hidden; margin-top: 4px; }
.rs-bar-inner { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #1e6b40, #27ae60); }
.rs-bar-inner.warn { background: linear-gradient(90deg, #e67e22, #f39c12); }

.rs-footer { padding: 14px 28px; background: #f7faf8; font-size: 11px; color: var(--gray); display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">

    <div class="ph no-print" style="margin-bottom:16px">
      <div class="ph-left">
        <h1>Resumen Semanal</h1>
        <p>Elegí las obras activas a incluir y generá un resumen rápido para compartir</p>
      </div>
      <button class="btn btn-outline" id="btn-print" onclick="window.print()" style="display:none">🖨️ Imprimir / PDF</button>
    </div>

    <div class="rs-controls no-print" id="rs-controls">
      <div class="loading"><div class="spinner"></div> Cargando obras activas...</div>
    </div>

    <div id="rs-empty" class="empty">
      <div class="empty-icon">📋</div>
      <h3>Sin resumen generado</h3>
      <p>Tildá las obras que querés mostrar y hacé clic en "Generar Resumen"</p>
    </div>

    <div id="rs-contenido" style="display:none"></div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
let usuario = null
let obrasActivas = []

async function init() {
  usuario = await requireAuth()
  if (!usuario) return
  renderSidebar(usuario, 'resumen-semanal')
  await cargarObrasActivas()
}

async function cargarObrasActivas() {
  const { data, error } = await db.from('obras').select('*').eq('estado', 'activa').order('nombre')
  if (error) { toast('Error al cargar obras', 'error'); return }
  obrasActivas = data || []

  const cont = document.getElementById('rs-controls')
  if (obrasActivas.length === 0) {
    cont.innerHTML = `<p style="font-size:13px;color:var(--gray)">No hay obras en estado "En Ejecución" actualmente.</p>`
    return
  }

  cont.innerHTML = `
    <div style="font-size:13px;font-weight:700;color:var(--primary)">Obras en Ejecución (${obrasActivas.length})</div>
    <div class="rs-check-list">
      ${obrasActivas.map(o => `
        <label class="rs-check-item">
          <input type="checkbox" value="${o.id}" checked>
          <span>${o.nombre}</span>
        </label>`).join('')}
    </div>
    <button class="btn btn-success" onclick="generarResumen()" style="padding:9px 20px">▶ Generar Resumen</button>`
}

async function generarResumen() {
  const checked = Array.from(document.querySelectorAll('.rs-check-item input:checked')).map(i => i.value)
  if (checked.length === 0) { toast('Tildá al menos una obra', 'error'); return }

  document.getElementById('rs-contenido').innerHTML = `<div class="loading"><div class="spinner"></div> Calculando...</div>`
  document.getElementById('rs-contenido').style.display = 'block'
  document.getElementById('rs-empty').style.display = 'none'

  const obrasSel = obrasActivas.filter(o => checked.includes(o.id))
  const resultados = await Promise.all(obrasSel.map(o => calcResumenObra(o)))

  const filas = resultados.map(r => {
    const pfClass = r.porcFisico >= 80 ? '' : r.porcFisico >= 40 ? '' : 'warn'
    const desvColor = r.desvio >= 0 ? '#27ae60' : '#c0392b'
    return `
      <div class="rs-obra-card">
        <div>
          <div class="rs-obra-nombre">${r.obra.nombre}</div>
          <div class="rs-obra-ubic">${r.obra.ubicacion || r.obra.descripcion || ''}</div>
        </div>
        <div>
          <div class="rs-metric-lbl">Avance Físico</div>
          <div class="rs-metric-val">${r.porcFisico}%</div>
          <div class="rs-bar-outer"><div class="rs-bar-inner ${pfClass}" style="width:${r.porcFisico}%"></div></div>
        </div>
        <div>
          <div class="rs-metric-lbl">Costo Real CD</div>
          <div class="rs-metric-val">${formatPeso(r.real)}</div>
        </div>
        <div>
          <div class="rs-metric-lbl">Desvío</div>
          <div class="rs-metric-val" style="color:${desvColor}">${r.desvio >= 0 ? '+' : ''}${formatPeso(r.desvio)}</div>
        </div>
      </div>`
  }).join('')

  const ahora = new Date()
  const fechaGen = ahora.toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' })

  const desvioTotal = resultados.reduce((s, r) => s + r.desvio, 0)
  const colorTotal   = desvioTotal >= 0 ? '#27ae60' : '#c0392b'
  const bgTotal       = desvioTotal >= 0 ? '#f0faf5' : '#fff5f5'

  document.getElementById('rs-contenido').innerHTML = `
    <div class="rs-wrap">
      <div class="rs-header">
        <div>
          <h2>📋 Resumen Semanal de Obras</h2>
          <p>${resultados.length} obra${resultados.length !== 1 ? 's' : ''} en ejecución</p>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:700">Serving Suite Control</div>
          <div style="font-size:11px;opacity:.85">${fechaGen}</div>
        </div>
      </div>
      ${filas}
      <div style="padding:16px 28px;background:${bgTotal};display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.03em">Desvío Total (todas las obras)</div>
        <div style="font-size:20px;font-weight:800;color:${colorTotal}">${desvioTotal >= 0 ? '+' : ''}${formatPeso(desvioTotal)}</div>
      </div>
      <div class="rs-footer">
        <span>Generado por <strong>Serving Suite Control</strong></span>
        <span>${fechaGen}</span>
      </div>
    </div>`

  document.getElementById('btn-print').style.display = 'inline-flex'
}

async function calcResumenObra(obra) {
  const k = obra.coeficiente_pase || 1
  const { data: items } = await db.from('items_obra').select('id, cantidad_presupuestada').eq('obra_id', obra.id)

  let totalPresupCD = 0, totalEarnedCD = 0, totalReal = 0

  if (items && items.length > 0) {
    const itemIds = items.map(i => i.id)
    const [{ data: partes }, { data: presupItems }] = await Promise.all([
      db.from('partes_diarios').select('id, item_id, cantidad_ejecutada').eq('obra_id', obra.id),
      db.from('presupuesto_items').select('item_id, cantidad, precio_unitario').in('item_id', itemIds)
    ])

    const parteIds = (partes || []).map(p => p.id)
    let mat = [], pers = [], eq = []
    if (parteIds.length > 0) {
      const [rMat, rPers, rEq] = await Promise.all([
        db.from('parte_materiales').select('parte_id, cantidad, precio_unitario, es_indirecto').in('parte_id', parteIds),
        db.from('parte_personal').select('parte_id, horas_trabajadas, horas_extras, precio_hora, gp, es_indirecto').in('parte_id', parteIds),
        db.from('parte_equipos').select('parte_id, horas_utilizadas, precio_hora, es_indirecto').in('parte_id', parteIds)
      ])
      mat = rMat.data || []; pers = rPers.data || []; eq = rEq.data || []
    }

    items.forEach(item => {
      const presupItem = (presupItems || []).filter(p => p.item_id === item.id)
        .reduce((s, p) => s + p.cantidad * p.precio_unitario, 0)
      const presupCD = presupItem / k

      const partesItem = (partes || []).filter(p => p.item_id === item.id)
      const ejecutado  = partesItem.reduce((s, p) => s + (p.cantidad_ejecutada || 0), 0)
      const porcItem   = item.cantidad_presupuestada > 0
        ? Math.min(100, ejecutado / item.cantidad_presupuestada * 100)
        : 0

      const idsItem  = partesItem.map(p => p.id)
      const realItem = (mat.filter(m => idsItem.includes(m.parte_id) && !m.es_indirecto).reduce((s, m) => s + m.cantidad * m.precio_unitario, 0))
                     + (pers.filter(p => idsItem.includes(p.parte_id) && !p.es_indirecto).reduce((s, p) => s + calcCostoMO(p), 0))
                     + (eq.filter(e => idsItem.includes(e.parte_id) && !e.es_indirecto).reduce((s, e) => s + e.horas_utilizadas * e.precio_hora, 0))

      totalPresupCD += presupCD
      totalEarnedCD += presupCD * (porcItem / 100)
      totalReal     += realItem
    })
  }

  const porcFisico = totalPresupCD > 0 ? Math.round(totalEarnedCD / totalPresupCD * 1000) / 10 : 0
  const desvio = totalEarnedCD - totalReal

  return { obra, porcFisico, real: totalReal, desvio }
}

init()
</script>
</body>
</html>
