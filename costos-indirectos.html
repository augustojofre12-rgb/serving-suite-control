<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serving Suite Control — Costos Indirectos</title>
<link rel="stylesheet" href="styles.css">
<style>
.cr-main {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden; padding-bottom: 0;
}
.cr-header {
  flex-shrink: 0;
  background: #c8dfd2;
  margin: -28px -32px 0;
  padding: 22px 32px 18px;
  border-bottom: 2px solid #a8c9b8;
  box-shadow: 0 4px 16px rgba(30,107,64,.12);
}
.cr-scroll { flex: 1; overflow-y: auto; padding: 24px 0 40px; }

.toggle-wrap {
  display: inline-flex;
  border: 1.5px solid #dde3dd;
  border-radius: 8px; overflow: hidden; background: #fff;
}
.toggle-wrap button {
  padding: 7px 16px; border: none; background: none;
  font-size: 13px; font-weight: 600; color: var(--gray);
  cursor: pointer; transition: all .15s;
}
.toggle-wrap button.active { background: var(--primary); color: #fff; }

/* Cards por categoría */
.ci-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.ci-card {
  background: #fff; border: 1.5px solid #e0e8e0;
  border-left: 4px solid #8e44ad;
  border-radius: 10px; padding: 14px 16px;
}
.ci-card-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--gray); font-weight: 700; margin-bottom: 6px; }
.ci-card-val { font-size: 14px; font-weight: 800; color: var(--text); }
.ci-card.total { background: #8e44ad; border-color: #8e44ad; }
.ci-card.total .ci-card-lbl { color: rgba(255,255,255,.75); }
.ci-card.total .ci-card-val { color: #fff; }

/* Tabla */
.cr-sec {
  background: #fff; border: 1.5px solid #e0e8e0;
  border-radius: 12px; overflow: hidden; margin-bottom: 20px;
}
.cr-sec-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; background: #f7f4fb;
  border-bottom: 1.5px solid #e0e8e0;
}
.cr-sec-head h3 { font-size: 14px; font-weight: 700; color: var(--text); margin: 0; }
.cr-sec-total { font-size: 14px; font-weight: 800; color: #8e44ad; }

.cr-tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.cr-tbl thead th {
  background: #f7f4fb; padding: 9px 16px;
  text-align: left; font-size: 11px;
  text-transform: uppercase; letter-spacing: .04em;
  color: var(--gray); font-weight: 700;
  border-bottom: 1.5px solid #dde8e0;
}
.cr-tbl thead th.tr { text-align: right; }
.cr-tbl tbody td { padding: 9px 16px; border-bottom: 1px solid #f0f0f0; color: var(--text); }
.cr-tbl tbody td.tr { text-align: right; }
.cr-tbl tbody tr:last-child td { border-bottom: none; }
.cr-tbl .subtotal-row td {
  background: #f7f4fb; font-weight: 700;
  border-top: 2px solid #dde8e0; border-bottom: none;
}
.fecha-badge {
  display: inline-block; background: #f7f4fb; color: #8e44ad;
  padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 700;
}
.cat-badge {
  display: inline-block; background: #f0e8f8; color: #8e44ad;
  padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;
}
.empty-sec { padding: 24px; text-align: center; color: var(--gray); font-size: 13px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main cr-main">

    <div class="cr-header">
      <div style="margin-bottom:12px">
        <a id="back-link" href="dashboard.html" class="back" style="font-size:13px">← Volver a la Obra</a>
      </div>
      <div class="ph" style="margin-bottom:14px">
        <div class="ph-left">
          <h1>Costos Indirectos</h1>
          <p id="obra-subtitulo" style="font-weight:600;color:var(--primary)">Cargando...</p>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button id="btn-total" class="btn btn-outline" style="font-size:12px;padding:6px 14px" onclick="setModoTotal()">📅 Total acumulado</button>
          <span style="font-size:12px;color:var(--gray)">o elegí período:</span>
          <input type="date" id="f-desde" style="padding:7px 10px;border:1.5px solid #dde3dd;border-radius:8px;font-size:13px;outline:none;background:#fff">
          <span style="font-size:12px;color:var(--gray)">al</span>
          <input type="date" id="f-hasta" style="padding:7px 10px;border:1.5px solid #dde3dd;border-radius:8px;font-size:13px;outline:none;background:#fff">
          <button class="btn btn-success" onclick="aplicarPeriodo()" style="padding:7px 16px;font-size:13px">▶ Aplicar</button>
        </div>
        <div class="toggle-wrap">
          <button id="tog-agrup" class="active" onclick="setVista('agrupado')">Por Categoría</button>
          <button id="tog-fecha" onclick="setVista('porfecha')">Por Fecha</button>
        </div>
      </div>
    </div>

    <div class="cr-scroll">
      <div id="cr-loading" style="text-align:center;padding:60px;color:var(--gray)">
        <div class="loading"><div class="spinner"></div> Cargando datos...</div>
      </div>
      <div id="cr-contenido" style="display:none">
        <div class="ci-cards" id="ci-cards"></div>
        <div class="cr-sec">
          <div class="cr-sec-head">
            <h3>💼 Detalle de Costos Indirectos</h3>
            <span class="cr-sec-total" id="head-total">—</span>
          </div>
          <div id="body-ci"></div>
        </div>
      </div>
    </div>

  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
let usuario = null
let obraId  = null
let vista   = 'agrupado'
let modoTotal = true
let datosCI = []

const CATS = ['Gastos Generales','Movilidad y Viáticos','Seguros y Garantías','Honorarios Profesionales','Seguridad Vial','Gastos Administrativos','Otros']

async function init() {
  usuario = await requireAuth()
  if (!usuario) return
  renderSidebar(usuario, '')

  const params = new URLSearchParams(location.search)
  obraId = params.get('obra_id')
  if (!obraId) { toast('Obra no especificada', 'error'); return }

  const { data: obra } = await db.from('obras').select('nombre, fecha_inicio').eq('id', obraId).single()
  if (obra) {
    document.title = `Costos Indirectos — ${obra.nombre}`
    document.getElementById('obra-subtitulo').textContent = obra.nombre
    document.getElementById('back-link').href = `obra.html?id=${obraId}`
  }

  const hoy = new Date()
  document.getElementById('f-hasta').value = hoy.toISOString().split('T')[0]
  if (obra?.fecha_inicio) {
    document.getElementById('f-desde').value = obra.fecha_inicio
  } else {
    const hace1anio = new Date(hoy); hace1anio.setFullYear(hoy.getFullYear() - 1)
    document.getElementById('f-desde').value = hace1anio.toISOString().split('T')[0]
  }

  modoTotal = true
  actualizarBtnTotal()
  await cargarDatos()
}

function setModoTotal() { modoTotal = true;  actualizarBtnTotal(); cargarDatos() }
function aplicarPeriodo() { modoTotal = false; actualizarBtnTotal(); cargarDatos() }

function actualizarBtnTotal() {
  const btn = document.getElementById('btn-total')
  btn.style.background = modoTotal ? 'var(--primary)' : ''
  btn.style.color      = modoTotal ? '#fff' : ''
}

function setVista(v) {
  vista = v
  document.getElementById('tog-agrup').classList.toggle('active', v === 'agrupado')
  document.getElementById('tog-fecha').classList.toggle('active', v === 'porfecha')
  renderTodo()
}

async function cargarDatos() {
  document.getElementById('cr-loading').style.display  = 'block'
  document.getElementById('cr-contenido').style.display = 'none'

  const desde = document.getElementById('f-desde').value
  const hasta  = document.getElementById('f-hasta').value

  // Traer partes filtrados por fecha
  let q = db.from('partes_diarios').select('id, fecha').eq('obra_id', obraId)
  if (!modoTotal && desde) q = q.gte('fecha', desde)
  if (!modoTotal && hasta) q = q.lte('fecha', hasta)
  const { data: partes } = await q

  if (!partes || partes.length === 0) {
    document.getElementById('cr-loading').innerHTML =
      '<p style="padding:40px;text-align:center;color:var(--gray)">Sin partes en el período seleccionado.</p>'
    return
  }

  const parteIds = partes.map(p => p.id)
  const fechaMap = {}
  partes.forEach(p => { fechaMap[p.id] = p.fecha })

  const { data: ci } = await db.from('parte_costos_indirectos')
    .select('parte_id, categoria, descripcion, unidad, monto')
    .in('parte_id', parteIds)

  datosCI = (ci || []).map(r => ({ ...r, fecha: fechaMap[r.parte_id] || '' }))

  document.getElementById('cr-loading').style.display  = 'none'
  document.getElementById('cr-contenido').style.display = 'block'
  renderTodo()
}

function renderTodo() {
  const total = datosCI.reduce((s, r) => s + (r.monto || 0), 0)
  document.getElementById('head-total').textContent = formatPeso(total)

  // Cards por categoría
  const porCat = {}
  datosCI.forEach(r => {
    if (!porCat[r.categoria]) porCat[r.categoria] = 0
    porCat[r.categoria] += r.monto || 0
  })
  const cats = Object.entries(porCat).sort((a, b) => b[1] - a[1])
  let cardsHtml = cats.map(([cat, val]) => `
    <div class="ci-card">
      <div class="ci-card-lbl">${cat}</div>
      <div class="ci-card-val">${formatPeso(val)}</div>
    </div>`).join('')
  cardsHtml += `
    <div class="ci-card total">
      <div class="ci-card-lbl">Total Indirectos</div>
      <div class="ci-card-val">${formatPeso(total)}</div>
    </div>`
  document.getElementById('ci-cards').innerHTML = cardsHtml

  if (!datosCI.length) {
    document.getElementById('body-ci').innerHTML =
      '<div class="empty-sec">Sin costos indirectos registrados en el período</div>'
    return
  }

  vista === 'agrupado' ? renderAgrupado() : renderPorFecha()
}

function renderAgrupado() {
  // Agrupar por categoría → descripción
  const map = {}
  datosCI.forEach(r => {
    const k = r.categoria + '||' + (r.descripcion || '—')
    if (!map[k]) map[k] = { cat: r.categoria, desc: r.descripcion || '—', unidad: r.unidad || '', total: 0, count: 0 }
    map[k].total += r.monto || 0
    map[k].count++
  })
  const rows = Object.values(map).sort((a, b) => a.cat.localeCompare(b.cat) || b.total - a.total)
  const grandTotal = datosCI.reduce((s, r) => s + (r.monto || 0), 0)

  // Agrupar filas por categoría con subtotal
  let html = `
    <table class="cr-tbl">
      <thead><tr>
        <th>Categoría</th>
        <th>Descripción</th>
        <th>Unidad</th>
        <th class="tr">Monto</th>
      </tr></thead>
      <tbody>`

  let currentCat = null
  let catTotal   = 0
  const catRows  = []

  rows.forEach((r, i) => {
    if (currentCat !== r.cat) {
      if (currentCat !== null) {
        catRows.push(`<tr style="background:#f7f4fb">
          <td colspan="3" style="font-size:12px;color:#8e44ad;font-weight:600;padding:6px 16px">Subtotal ${currentCat}</td>
          <td class="tr" style="font-size:12px;color:#8e44ad;font-weight:700;padding:6px 16px">${formatPeso(catTotal)}</td>
        </tr>`)
      }
      currentCat = r.cat
      catTotal   = 0
    }
    catTotal += r.total
    catRows.push(`<tr>
      <td><span class="cat-badge">${r.cat}</span></td>
      <td>${r.desc}</td>
      <td style="color:var(--gray);font-size:12px">${r.unidad || '—'}</td>
      <td class="tr"><strong>${formatPeso(r.total)}</strong></td>
    </tr>`)
    if (i === rows.length - 1) {
      catRows.push(`<tr style="background:#f7f4fb">
        <td colspan="3" style="font-size:12px;color:#8e44ad;font-weight:600;padding:6px 16px">Subtotal ${currentCat}</td>
        <td class="tr" style="font-size:12px;color:#8e44ad;font-weight:700;padding:6px 16px">${formatPeso(catTotal)}</td>
      </tr>`)
    }
  })

  html += catRows.join('')
  html += `<tr class="subtotal-row">
    <td colspan="3"><strong>TOTAL COSTOS INDIRECTOS</strong></td>
    <td class="tr"><strong>${formatPeso(grandTotal)}</strong></td>
  </tr>`
  html += '</tbody></table>'
  document.getElementById('body-ci').innerHTML = html
}

function renderPorFecha() {
  const sorted = [...datosCI].sort((a, b) => (a.fecha || '') < (b.fecha || '') ? -1 : 1)
  const grandTotal = sorted.reduce((s, r) => s + (r.monto || 0), 0)

  const html = `
    <table class="cr-tbl">
      <thead><tr>
        <th>Fecha</th>
        <th>Categoría</th>
        <th>Descripción</th>
        <th>Unidad</th>
        <th class="tr">Monto</th>
      </tr></thead>
      <tbody>
        ${sorted.map(r => {
          const fechaFmt = r.fecha
            ? new Date(r.fecha + 'T12:00').toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'2-digit' })
            : '—'
          return `<tr>
            <td><span class="fecha-badge">${fechaFmt}</span></td>
            <td><span class="cat-badge">${r.categoria}</span></td>
            <td>${r.descripcion || '—'}</td>
            <td style="color:var(--gray);font-size:12px">${r.unidad || '—'}</td>
            <td class="tr"><strong>${formatPeso(r.monto)}</strong></td>
          </tr>`
        }).join('')}
        <tr class="subtotal-row">
          <td colspan="4"><strong>TOTAL COSTOS INDIRECTOS</strong></td>
          <td class="tr"><strong>${formatPeso(grandTotal)}</strong></td>
        </tr>
      </tbody>
    </table>`
  document.getElementById('body-ci').innerHTML = html
}

init()
</script>
</body>
</html>
